<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 프로필</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="profile-header">
            <div class="profile-image"></div>
            <div class="profile-info">
                <h1 class="nickname">닉네임</h1>
                <p class="userid">@아이디</p>
            </div>
        </header>

        <section class="bio-section">
            <p class="description">안녕하세요. 이곳은 저의 작업과 기록을 모아둔 공간입니다.</p>
            <p class="link-item"><a href="#">🔗 첫 번째 링크 (예: 포트폴리오)</a></p>
            <p class="link-item"><a href="#">🔗 두 번째 링크 (예: 개인 블로그)</a></p>
        </section>

        <hr class="divider">

        <section class="feed-section">
            <h2 class="year-title">2026</h2>
            <div class="grid-container">
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #e6e6fa;"></div>
                    <div class="hover-overlay"><span>시집 출간일</span></div>
                </a>
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #f0e6fa;"></div>
                    <div class="hover-overlay"><span>작업 기록</span></div>
                </a>
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #e6f0fa;"></div>
                    <div class="hover-overlay"><span>영감 모음</span></div>
                </a>
            </div>
        </section>

        <hr class="divider">

        <section class="feed-section">
            <h2 class="year-title">2025</h2>
            <div class="grid-container">
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #b0c4de;"></div>
                    <div class="hover-overlay"><span>웹 개발 시작</span></div>
                </a>
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #c4d8e2;"></div>
                    <div class="hover-overlay"><span>HTML/CSS</span></div>
                </a>
                <a href="#" class="feed-item">
                    <div class="bg-image" style="background-color: #d8e2c4;"></div>
                    <div class="hover-overlay"><span>일상 사진</span></div>
                </a>
            </div>
        </section>

        <hr class="divider">

        <section class="dday-section">
            <div class="grid-container">
                <div class="feed-item">
                    <div class="bg-image" style="background-color: #a8b8d0;"></div>
                    <div class="hover-overlay always-dark">
                        <span class="dday-text" data-date="2024-01-01">계산 중...</span>
                    </div>
                </div>
                <div class="feed-item">
                    <div class="bg-image" style="background-color: #c0b0d0;"></div>
                    <div class="hover-overlay always-dark">
                        <span class="dday-text" data-date="2026-08-18">계산 중...</span>
                    </div>
                </div>
                <div class="feed-item">
                    <div class="bg-image" style="background-color: #b0d0c0;"></div>
                    <div class="hover-overlay always-dark">
                        <span class="dday-text" data-date="2025-12-25">계산 중...</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
